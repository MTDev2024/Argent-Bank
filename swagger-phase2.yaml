swagger: '2.0'
info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '1.0.0'
  termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
  - http
paths:
  /accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - "Transaction Module"
      summary: transactions
      description: API for transactions listing
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          type: string
          required: true
        - in: path
          name: accountId
          type: string
          description: Account identifier
          required: true
      produces:
        - application/json
      responses:
        '200':
          description: User transactions retrieved successfully
          schema:
            $ref: '#/definitions/TransactionsResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /accounts/{accountId}/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - "Transaction Module"
      summary: transaction
      description: API for transaction details
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          type: string
          required: true
        - in: path
          name: accountId
          type: string
          description: Account identifier
          required: true
        - in: path
          name: transactionId
          type: string
          description: Transaction identifier
          required: true
      produces:
        - application/json
      responses:
        '200':
          description: User transaction retrieved successfully
          schema:
            $ref: '#/definitions/TransactionDetailResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    patch:
      security:
        - Bearer: []
      tags:
        - "Transaction Module"
      summary: Informations modification API
      description: API for updating a transaction's category or notes
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          type: string
          required: true
        - in: path
          name: accountId
          type: string
          description: Account identifier
          required: true
        - in: path
          name: transactionId
          type: string
          description: Transaction identifier
          required: true
        - in: body
          name: body
          description: Transaction fields to update
          required: true
          schema:
            $ref: '#/definitions/TransactionUpdate'
      produces:
        - application/json
      responses:
        '200':
          description: User transaction successfully updated
          schema:
            $ref: '#/definitions/TransactionUpdateResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
    delete:
      security:
        - Bearer: []
      tags:
        - "Transaction Module"
      summary: Informations delete API
      description: API for deleting a transaction's category or notes
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          type: string
          required: true
        - in: path
          name: accountId
          type: string
          description: Account identifier
          required: true
        - in: path
          name: transactionId
          type: string
          description: Transaction identifier
          required: true
        - in: body
          name: body
          description: Transaction field to delete
          required: true
          schema:
            $ref: '#/definitions/TransactionDelete'
      produces:
        - application/json
      responses:
        '200':
          description: User transaction successfully deleted
          schema:
            $ref: '#/definitions/TransactionDeleteResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
definitions:
  TransactionsResponse:
    type: object
    properties:
      status:
        type: integer
        description: Response status code
      message:
        type: string
        description: Response message
      body:
        type: array
        items:
          type: object
          properties:
            transactionId:
              type: string
              description: Transaction identifier
            accountId:
              type: string
              description: Account identifier
            date:
              type: string
              description: Transaction date
            description:
              type: string
              description: Transaction description
            amount:
              type: number
              description: Transaction amount
            balance:
              type: number
              description: Account balance
  TransactionDetailResponse:
    type: object
    properties:
      status:
        type: integer
        description: Response status code
      message:
        type: string
        description: Response message
      body:
        type: object
        properties:
          transactionId:
            type: string
            description: Transaction identifier
          accountId:
            type: string
            description: Account identifier
          date:
            type: string
            description: Transaction date
          description:
            type: string
            description: Transaction description
          amount:
            type: number
            description: Transaction amount
          balance:
            type: number
            description: Account balance
          transactionType:
            type: string
            description: Transaction type
          category:
            type: string
            description: Transaction category
          notes:
            type: string
            description: User notes about the transaction
  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
        description: Transaction category
      notes:
        type: string
        description: User notes about the transaction
  TransactionDelete:
    type: object
    properties:
      field:
        type: string
        description: Name of the field to delete (category or notes)
  TransactionUpdateResponse:
    type: object
    properties:
      status:
        type: integer
        description: Response status code
      message:
        type: string
        description: Response message
      body:
        type: object
        properties:
          transactionId:
            type: string
            description: Transaction identifier
          category:
            type: string
            description: Updated transaction category
          notes:
            type: string
            description: Updated user notes
  TransactionDeleteResponse:
    type: object
    properties:
      status:
        type: integer
        description: Response status code
      message:
        type: string
        description: Response message
      body:
        type: object
        properties:
          transactionId:
            type: string
            description: Transaction identifier
          category:
            type: string
            description: Transaction category after deletion
          notes:
            type: string
            description: User notes after deletion
